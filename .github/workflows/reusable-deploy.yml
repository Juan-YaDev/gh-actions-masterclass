name: Deploy Reutilizable

on:
  workflow_call:
    inputs:
      entorno:
        description: 'Entorno de despliegue'
        required: true
        type: string
      version:
        description: 'Versión a desplegar'
        required: false
        type: string
        default: 'latest'
    outputs:
      deploy_url:
        description: 'URL final del despliegue'
        value: ${{ jobs.deploy.outputs.url }}
    secrets:
      DEPLOY_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.set_url.outputs.final_url }}

    steps:
      - name: Desplegando...
        run: |
          echo "🚀 Desplegando versión ${{ inputs.version }} en ${{ inputs.entorno }}"
          echo "🔑 Usando token secreto (oculto)"

      - name: Generar URL
        id: set_url
        run: echo "final_url=https://${{ inputs.entorno }}.miapp.com" >> $GITHUB_OUTPUT

      # Este step no es necesario para exponer el output