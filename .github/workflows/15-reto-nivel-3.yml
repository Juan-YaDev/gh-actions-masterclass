name: 15 - El Guardián del Repositorio

on:
  pull_request: [opened, synchronize]

jobs:
  validación_matricial:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read      

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Node ${{ matrix.os }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Ejecutar tests
        run: |
          echo "Corriendo tests en OS: ${{ matrix.os }}"
           
  comentando_estado:
    runs-on: ubuntu-latest
    needs: validación_matricial
    permissions:
      pull-requests: write

    steps:
      - name: Comentar en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const { context, github } = require('@actions/github');
            const { pull_request } = context.payload;

            // Verificar si todos los jobs de validación_matricial pasaron
            const conclusion = context.payload.workflow_run.conclusion;
            let commentBody = '';

            if (conclusion === 'success') {
              commentBody = '✅ Todos los tests pasaron correctamente en todas las plataformas.';
            } else {
              commentBody = '❌ Algunos tests fallaron. Por favor, revisa los logs de los jobs para más detalles.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull_request.number,
              body: commentBody,
            });      