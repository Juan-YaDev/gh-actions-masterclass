name: 10 - reto nivel 2

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonando el repositorio
        uses: actions/checkout@v4

      - name: Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalando dependencias
        run: npm install

      - name: Simular compilacion creando build.zip
        run: |
          zip -r build.zip .
      
      - name: Subiendo artifact build.zip
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build.zip
          retention-days: 1

  deploy_only_main:
    if: github.ref == 'refs/heads/develop' # Solo corre si es la rama develop
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Descargar artifact build.zip
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
      
      - name: simulando despliegue
        run: |
          echo "✅ GITHUB_TOKEN está disponible automáticamente"
          echo "Longitud del token: ${#GITHUB_TOKEN} caracteres"
          echo "DEPLOY_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          echo "El token es: $DEPLOY_TOKEN"
      
      - name: Simulando error en despliegue
        run: |
          echo "Simulando error en despliegue"
          exit 1

      - name: Paso condicional basado en el anterior
        if: failure() # Solo corre si el paso anterior falló
        run: echo "¡El despliegue falló! Ejecutando plan de contingencia."
          