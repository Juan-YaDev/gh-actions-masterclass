name: 06 - Secretos y Variables de Entorno

on:
  push:
    branches: [ main, develop ]
  pull_request:

# Variables de entorno públicas (no sensibles)
env:
  ENTORNO_GLOBAL: "desarrollo"

jobs:
  probar_configuracion:
    runs-on: ubuntu-latest
    
    env:
      ENTORNO_JOB: "testing"

    steps:
      - name: 1. Variables de entorno normales
        env:
          ENTORNO_STEP: "local"
        run: |
          echo "🌍 Global  → $ENTORNO_GLOBAL"
          echo "📍 Job     → $ENTORNO_JOB"
          echo "🔧 Step    → $ENTORNO_STEP"

      - name: 2. GITHUB_TOKEN (Secreto automático)
        run: |
          echo "✅ GITHUB_TOKEN está disponible automáticamente"
          echo "Longitud del token: ${#GITHUB_TOKEN} caracteres"
          # Nunca hagas echo $GITHUB_TOKEN completo

      - name: 3. Usando Secretos personalizados (Mejor práctica)
        run: |
          echo "🔐 Usando secreto..."
          
          # Forma recomendada: usar directamente el contexto
          echo "Mi API Key (enmascarada): ${{ secrets.MI_API_KEY }}"
          
          # También puedes asignarlo a una variable de entorno
          echo "MI_API_KEY=${{ secrets.MI_API_KEY }}" >> $GITHUB_ENV

      - name: 4. Demostración del enmascaramiento de secretos
        run: |
          # GitHub enmascara el valor exacto del secreto
          echo "Secreto completo: ${{ secrets.MI_API_KEY }}"
          
          # ¡Cuidado! Si lo manipulas, puede dejar de enmascararse:
          echo "Secreto manipulado: ${{ secrets.MI_API_KEY }}-v1"
          echo "Secreto en base64: $(echo -n '${{ secrets.MI_API_KEY }}' | base64)"

      - name: 5. Buena práctica - Enmascarar manualmente
        run: |
          echo "::add-mask::valor-super-secreto-12345"
          echo "Esto nunca se mostrará: valor-super-secreto-12345"